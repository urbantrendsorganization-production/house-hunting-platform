<svg xmlns="http://www.w3.org/2000/svg" width="108" height="108" viewBox="0 0 108 108">
  <!-- Keja agent app launcher icon: house inside a map pin, teal brand gradient.
       Legacy square variant (rounded rect). Source of truth for the PNGs in res/. -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="108" y2="108" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#16C0B0"/>
      <stop offset="1" stop-color="#0C8579"/>
    </linearGradient>
  </defs>
  <rect width="108" height="108" rx="24" fill="url(#g)"/>
  <!-- white map pin (Material place glyph, scaled + centred) -->
  <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"
        transform="translate(18,18) scale(3)" fill="#FFFFFF"/>
  <!-- teal house sitting in the pin head -->
  <path d="M45 45 L54 36 L63 45 Z" fill="#0C8579"/>
  <path d="M47.5 45 H60.5 V56 H47.5 Z" fill="#0C8579"/>
  <!-- white door -->
  <path d="M52 50 H56 V56 H52 Z" fill="#FFFFFF"/>
</svg>
