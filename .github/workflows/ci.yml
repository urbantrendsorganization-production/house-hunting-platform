name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api

    services:
      db:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: keja
          POSTGRES_USER: keja
          POSTGRES_PASSWORD: keja
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U keja -d keja"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    env:
      DJANGO_SECRET_KEY: ci-secret
      DATABASE_URL: postgis://keja:keja@localhost:5432/keja
      REDIS_URL: redis://localhost:6379/0
      DEBUG: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Install GDAL/GEOS/PROJ
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils gdal-bin libgdal-dev libgeos-dev libproj-dev

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: api/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Ruff
        run: ruff check .

      - name: Black
        run: black --check .

      - name: Migrations up to date
        run: python manage.py makemigrations --check --dry-run

      - name: Test
        run: pytest

  build-image:
    runs-on: ubuntu-latest
    needs: lint-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          build-args: INSTALL_DEV=false
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api:latest
            ghcr.io/${{ github.repository }}/api:${{ github.sha }}
