name: consumer_app
description: "Keja consumer map-first discovery app"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State — Riverpod (CLAUDE.md).
  flutter_riverpod: ^2.6.1

  # Map — Google Maps SDK (free native loads; best Kenya data).
  google_maps_flutter: ^2.9.0

  # Location + API + directions deep-link + Places autocomplete.
  geolocator: ^13.0.1
  dio: ^5.7.0
  url_launcher: ^6.3.1
  uuid: ^4.5.1
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
