# Production stack for Keja — shared UrbanTrends host (Phase 7).
#
#   cd ops/compose
#   cp ../env/prod.env.example .env   # fill in real secrets — never commit .env
#   docker compose -f docker-compose.prod.yml up -d --build
#
# This box already runs a HOST-LEVEL reverse proxy (the one owning :80/:443 for
# onboardkit / urbantrends / sitechat / rentflow). So keja does NOT bundle its
# own Caddy — that would fight the host proxy for 80/443. Instead api + web bind
# to loopback ports and the host proxy fronts them + terminates TLS. See
# ops/caddy/Caddyfile for the standalone (self-TLS) variant if ever deployed solo.
#
# Loopback ports (host-side, 127.0.0.1 only — never 0.0.0.0):
#   * api        -> ${API_HOST_PORT:-8087}      (api.keja.urbantrends.dev)
#   * web        -> ${WEB_HOST_PORT:-3002}      (keja.urbantrends.dev)
#   * minio S3   -> ${MINIO_S3_PORT:-9100}      (s3.keja.urbantrends.dev)
#   * minio ui   -> ${MINIO_CONSOLE_PORT:-9101} (private — SSH tunnel only)
#   In use on this box already: 3000 3001 5000 8000 8001 8083 8086.
#
# Other notes:
#   * API/worker run the published GHCR image (no local build, no code mount).
#   * gunicorn (not runserver); a dedicated celery-beat service owns the schedule.
#   * db/redis stay internal — no host ports at all.
#   * restart: unless-stopped everywhere so the box self-heals on reboot.
name: keja-prod

x-api-env: &api-env
  DEBUG: "false"
  DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:?set in .env}
  ALLOWED_HOSTS: ${ALLOWED_HOSTS:?set in .env}
  CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-}
  CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
  DATABASE_URL: postgis://keja:${POSTGRES_PASSWORD:?set in .env}@db:5432/keja
  REDIS_URL: redis://redis:6379/0
  AWS_S3_ENDPOINT_URL: ${AWS_S3_ENDPOINT_URL}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
  AWS_STORAGE_BUCKET_NAME: ${AWS_STORAGE_BUCKET_NAME:-keja-media}
  SENTRY_DSN: ${SENTRY_DSN:-}
  SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}

services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: keja
      POSTGRES_USER: keja
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
    volumes:
      - /srv/keja/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keja -d keja"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - /srv/keja/redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  minio:
    # Self-hosted S3-compatible object storage for building/unit photos.
    # The host Caddy fronts the S3 API publicly at s3.keja.urbantrends.dev so the
    # presigned PUT/GET URLs the API hands out are reachable from phones/browsers.
    # Bucket stays PRIVATE — reads go through presigned GET, not public objects.
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set in .env}
    volumes:
      - /srv/keja/miniodata:/data
    # Loopback only. S3 API -> host Caddy (public). Console stays private (SSH tunnel).
    ports:
      - "127.0.0.1:${MINIO_S3_PORT:-9100}:9000"
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9101}:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # Creates the media bucket on first boot, then exits (private bucket).
  minio-setup:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set in .env}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set in .env}
      BUCKET: ${AWS_STORAGE_BUCKET_NAME:-keja-media}
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD} &&
      mc mb --ignore-existing local/$${BUCKET} &&
      echo 'bucket ready';
      "
    restart: "no"

  api:
    image: ${API_IMAGE:-ghcr.io/urbantrendsorganization-production/house-hunting-platform/api:latest}
    command: >
      /bin/sh -c "
      python manage.py migrate --noinput &&
      python manage.py collectstatic --noinput &&
      gunicorn keja.wsgi:application --bind 0.0.0.0:8000 --workers 3 --access-logfile -
      "
    environment: *api-env
    # Loopback only — the host reverse proxy fronts this + terminates TLS.
    ports:
      - "127.0.0.1:${API_HOST_PORT:-8087}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    image: ${API_IMAGE:-ghcr.io/urbantrendsorganization-production/house-hunting-platform/api:latest}
    command: celery -A keja worker -l info
    environment: *api-env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  beat:
    image: ${API_IMAGE:-ghcr.io/urbantrendsorganization-production/house-hunting-platform/api:latest}
    # The hourly staleness sweep lives here — exactly one beat scheduler.
    command: celery -A keja beat -l info
    environment: *api-env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  web:
    # Website (Next.js). Unlike api/worker/beat, the web image is NOT published
    # to GHCR by CI, so it's built on the box from ../../web. NEXT_PUBLIC_* are
    # inlined at build time -> passed as build args; API_BASE is read at runtime.
    build:
      context: ../../web
      args:
        NEXT_PUBLIC_API_BASE: ${NEXT_PUBLIC_API_BASE:-https://${API_DOMAIN}/api/v1}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL:-https://${WEB_DOMAIN}}
        NEXT_PUBLIC_GOOGLE_MAPS_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_KEY:-}
        NEXT_PUBLIC_PLAY_STORE_URL: ${NEXT_PUBLIC_PLAY_STORE_URL:-}
        NEXT_PUBLIC_CONSUMER_APK_URL: ${NEXT_PUBLIC_CONSUMER_APK_URL:-}
        NEXT_PUBLIC_AGENT_APK_URL: ${NEXT_PUBLIC_AGENT_APK_URL:-}
    environment:
      NODE_ENV: production
      # Server-side fetches go over the internal network, not back out through
      # the host proxy.
      API_BASE: ${API_BASE:-http://api:8000/api/v1}
    # Loopback only — the host reverse proxy fronts this + terminates TLS.
    ports:
      - "127.0.0.1:${WEB_HOST_PORT:-3002}:3000"
    depends_on:
      - api
    restart: unless-stopped
